<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3d_design | Метрики</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0cf;
      --surface: rgba(255, 248, 214, 0.84);
      --surface-strong: #fffceb;
      --text: #101010;
      --muted: #5c532d;
      --line: rgba(15, 15, 15, 0.12);
      --accent: #f4c400;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
      --radius: 24px;
      --container: 1100px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(244, 196, 0, 0.18), transparent 24%),
        linear-gradient(180deg, #fffbe8 0%, #efe5a7 100%);
    }

    .container {
      width: min(var(--container), calc(100% - 24px));
      margin: 0 auto;
    }

    .page {
      padding: 56px 0 72px;
    }

    .hero,
    .panel,
    .summary-card,
    .lead-table {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero {
      padding: 32px;
      margin-bottom: 20px;
    }

    .hero h1,
    .hero h2 {
      margin: 0 0 12px;
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: -0.04em;
    }

    .hero p,
    .panel p,
    .lead-table td,
    .lead-table th {
      line-height: 1.7;
    }

    .panel {
      padding: 24px;
      margin-bottom: 20px;
    }

    .panel-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      margin-top: 16px;
    }

    input,
    button {
      font: inherit;
    }

    input {
      width: 100%;
      min-height: 54px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 252, 236, 0.94);
      color: var(--text);
    }

    button {
      min-height: 54px;
      padding: 0 18px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, #f4c400, #ffd84a);
      color: #111;
      font-weight: 800;
      cursor: pointer;
    }

    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(17, 17, 17, 0.05);
      color: #2f2f2f;
      display: none;
    }

    .status.is-visible {
      display: block;
    }

    .status.is-error {
      background: rgba(177, 49, 49, 0.12);
      color: #7a1e1e;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .summary-card {
      padding: 22px;
    }

    .summary-card small {
      display: block;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .summary-card strong {
      display: block;
      margin-top: 12px;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-family: "Space Grotesk", sans-serif;
    }

    .lead-table {
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(15, 15, 15, 0.08);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: rgba(255, 255, 255, 0.42);
      font-size: 0.86rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .empty {
      padding: 22px;
      color: var(--muted);
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 820px) {
      .panel-form,
      .summary-grid {
        grid-template-columns: 1fr;
      }

      table,
      thead,
      tbody,
      th,
      td,
      tr {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(15, 15, 15, 0.08);
      }

      td {
        padding: 4px 0;
        border: 0;
      }

      td::before {
        content: attr(data-label) ": ";
        font-weight: 800;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="container">
      <section class="hero">
        <h1>Встроенная аналитика сайта</h1>
        <p>Введите <code>METRICS_TOKEN</code>, чтобы посмотреть просмотры, обращения в AI-чат и заявки без сырого JSON.</p>
      </section>

      <section class="panel">
        <h2>Доступ к метрикам</h2>
        <p class="muted">Токен берется из переменной окружения <code>METRICS_TOKEN</code>.</p>
        <form class="panel-form" id="metrics-form">
          <input id="metrics-token" type="password" placeholder="Введите METRICS_TOKEN" autocomplete="off">
          <button type="submit">Загрузить</button>
        </form>
        <div class="status" id="metrics-status"></div>
      </section>

      <section class="summary-grid" id="metrics-summary"></section>

      <section class="lead-table">
        <table>
          <thead>
            <tr>
              <th>Время</th>
              <th>Лид</th>
              <th>Источник</th>
              <th>Файл</th>
              <th>Telegram</th>
            </tr>
          </thead>
          <tbody id="metrics-leads">
            <tr>
              <td colspan="5" class="empty">Пока нет данных. Введите токен и нажмите “Загрузить”.</td>
            </tr>
          </tbody>
        </table>
      </section>
    </div>
  </main>

  <script>
    const form = document.querySelector("#metrics-form");
    const tokenInput = document.querySelector("#metrics-token");
    const statusBox = document.querySelector("#metrics-status");
    const summaryGrid = document.querySelector("#metrics-summary");
    const leadsTable = document.querySelector("#metrics-leads");

    const summaryLabels = {
      page_views: "Просмотры",
      assistant_prompts: "Обращения в AI",
      assistant_replies: "Ответы AI",
      leads_total: "Всего заявок",
      leads_with_file: "Заявки с файлом",
      leads_last_7_days: "Заявки за 7 дней",
      leads_last_30_days: "Заявки за 30 дней",
    };

    const setStatus = (message = "", isError = false) => {
      statusBox.textContent = message;
      statusBox.className = "status";
      if (!message) return;
      statusBox.classList.add("is-visible");
      if (isError) {
        statusBox.classList.add("is-error");
      }
    };

    const renderSummary = (summary = {}) => {
      summaryGrid.innerHTML = "";
      Object.entries(summaryLabels).forEach(([key, label]) => {
        const card = document.createElement("article");
        card.className = "summary-card";
        card.innerHTML = `<small>${label}</small><strong>${summary[key] ?? 0}</strong>`;
        summaryGrid.appendChild(card);
      });
    };

    const renderLeads = (items = []) => {
      leadsTable.innerHTML = "";

      if (!items.length) {
        leadsTable.innerHTML = '<tr><td colspan="5" class="empty">Заявок пока нет.</td></tr>';
        return;
      }

      items.forEach((item) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td data-label="Время">${item.timestamp || "—"}</td>
          <td data-label="Лид">${item.lead_id || "—"}</td>
          <td data-label="Источник">${item.source || "—"}</td>
          <td data-label="Файл">${item.has_file ? "Да" : "Нет"}</td>
          <td data-label="Telegram">${item.telegram_sent ? "Да" : "Нет"}</td>
        `;
        leadsTable.appendChild(row);
      });
    };

    const loadMetrics = async (token) => {
      const response = await fetch(`/api/metrics?token=${encodeURIComponent(token)}`, {
        cache: "no-store",
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || "Не удалось загрузить метрики.");
      }

      return data;
    };

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const token = tokenInput.value.trim();

      if (!token) {
        setStatus("Введите METRICS_TOKEN.", true);
        return;
      }

      setStatus("Загружаем метрики...");

      try {
        const data = await loadMetrics(token);
        renderSummary(data.summary || {});
        renderLeads(data.recent_leads || []);
        setStatus(`Метрики обновлены. Снимок сформирован: ${data.generated_at || "сейчас"}.`);
        localStorage.setItem("printforge-metrics-token", token);
      } catch (error) {
        setStatus(String(error.message || error), true);
      }
    });

    const savedToken = localStorage.getItem("printforge-metrics-token");
    if (savedToken) {
      tokenInput.value = savedToken;
    }
  </script>
</body>
</html>
